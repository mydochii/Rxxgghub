<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Feed</title>

<style>
body{
    margin:0;
    background:#0f0f0f;
    font-family:Arial;
    color:white;
}
.grid{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
    padding:10px;
    padding-bottom:70px;
}
.video-card{
    display:flex;
    gap:10px;
    background:#1a1a1a;
    padding:8px;
    border-radius:12px;
    cursor:pointer;
}
.thumb{
    position:relative;
    width:140px;
    flex-shrink:0;
}
.thumb video{
    width:100%;
    height:90px;
    object-fit:cover;
    border-radius:10px;
}
.play-overlay{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:26px;
    background:rgba(0,0,0,0.6);
    border-radius:50%;
    padding:6px 10px;
}
.title{
    font-size:13px;
    color:#ddd;
    line-height:1.3;
}
.navbar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#111;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    border-top:1px solid #222;
}
.navbar div{
    font-size:12px;
    opacity:0.7;
}
.navbar .active{
    opacity:1;
    font-weight:bold;
}
#player{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
    flex-direction:column;
}
#player video{
    width:95%;
    max-width:500px;
}
#closeBtn{
    position:absolute;
    top:15px;
    right:20px;
    font-size:30px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="app" class="grid"></div>

<div class="navbar">
    <div class="active">Home</div>
    <div>Trending</div>
    <div>Profile</div>
</div>

<div id="player">
    <span id="closeBtn">✕</span>
    <video id="mainVideo" controls playsinline></video>
</div>

<script>
const ad = "https://otieu.com/4/10005133";

const videoList = [
  ["https://cdn2.videy.co/OKopjGWu1.mp4","📍M4L4M S3P1 J4D1 BR4N1"],
  ["https://cdn2.videy.co/lqn6mNjH1.mp4","📍T4NT3 K3G3T4H4N D1 K4M4R"],
  ["https://cdn2.videy.co/A4lt5roj1.mp4","📍M4NT4N D4T4NG P4S L4G1 3N4K"],
  ["https://cdn2.videy.co/9V8C7zdz1.mp4","📍G4G4L F0KVS L1H4T 4Y4NG"],
  ["https://cdn2.videy.co/NVbzUHoV1.mp4","📍K3P1NCVT S4M4 T4NT3"],
  ["https://cdn2.videy.co/n2yQ46g91.mp4","📍S4L4H K4M4R J4D1 P4N1K"],
  ["https://cdn2.videy.co/G7La6ONC1.mp4","📍B4RV S4D4R TVDH D1R3K4M"],
  ["https://cdn2.videy.co/FEKmEyzr1.mp4","📍NG3NT D1 3GW33 K4NT0R"],
  ["https://cdn2.videy.co/y92cgXxp1.mp4","📍T4NT3 K3C4NDV4N B3R4T"],
  ["https://cdn2.videy.co/BeJyQtTD1.mp4","📍S3K4L1 C0B4 L4NGSUNG N4G1H"],
  ["https://cdn2.videy.co/pirj5HJx1.mp4","📍M4M4 K3S3P14N M4L4M 1NV"],
  ["https://cdn2.videy.co/kz7vrNnC1.mp4","📍D1 P3RGP1 D4D4K4N"],
  ["https://cdn2.videy.co/xENnfm9u1.mp4","📍K3T4GVH4N S44T L4G1 P4N45"],
  ["https://cdn2.videy.co/T6eoqa3X1.mp4","📍T4NT3 T1D4K K3NVNG"],
  ["https://cdn2.videy.co/NhkDNdkG1.mp4","📍NG3NT D1 RVM4H S3ND1R1"]
];

const app = document.getElementById("app");
const player = document.getElementById("player");
const mainVideo = document.getElementById("mainVideo");
const closeBtn = document.getElementById("closeBtn");

videoList.forEach(v => {

    const card = document.createElement("div");
    card.className = "video-card";

    const thumb = document.createElement("div");
    thumb.className = "thumb";

    const vid = document.createElement("video");
    vid.src = v[0];
    vid.muted = true;
    vid.preload = "metadata";
    vid.playsInline = true;

    const play = document.createElement("div");
    play.className = "play-overlay";
    play.innerHTML = "▶";

    thumb.appendChild(vid);
    thumb.appendChild(play);

    const title = document.createElement("div");
    title.className = "title";
    title.innerHTML = v[1];

    card.appendChild(thumb);
    card.appendChild(title);
    app.appendChild(card);

    card.onclick = () => {
        player.style.display = "flex";
        mainVideo.src = v[0];
        mainVideo.currentTime = 0;
        mainVideo.play();

        // IKLAN AWAL (KLIK)
        window.open(ad,"_blank");

        let ad20 = false;
        let ad40 = false;

        mainVideo.ontimeupdate = () => {
            const t = Math.floor(mainVideo.currentTime);

            if(t >= 20 && !ad20){
                ad20 = true;
                window.open(ad,"_blank");
            }

            if(t >= 40 && !ad40){
                ad40 = true;
                window.open(ad,"_blank");
            }
        };
    };
});

closeBtn.onclick = () => {
    mainVideo.pause();
    mainVideo.src = "";
    player.style.display = "none";
};
</script>

</body>
</html>
